<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#FAFBFF">
<meta name="mobile-web-app-capable" content="yes">
<title>makedoo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
  --bg:#FAFBFF;--surface:#FFFFFF;--border:#EAECF5;--text:#1A2340;--muted:#8A96B4;
  --green:#00C48C;--green-dark:#00A878;--green-light:#D4F5E9;--green-text:#00875A;
  --blue:#4A6CF7;--blue-dark:#6A3DE8;--blue-light:#EEF2FF;--blue-text:#2D4FBF;
  --orange:#FF8C42;--orange-light:#FFF0E6;--orange-text:#C05000;
  --red:#FF4757;--red-light:#FFE0E3;--red-text:#C0002A;
  --neutral-light:#F0F2F8;--neutral-text:#6B7A99;
  --line:#EAECF5;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;max-width:480px;margin:0 auto}

/* ── LOGO ── */
.logo-band{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 0 10px;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--surface)}
.logo-text{font-size:22px;font-weight:900;letter-spacing:-0.5px;color:var(--text)}

/* ── TOP BAR ── */
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--line)}
.conv-btn{background:var(--blue-light);border:none;border-radius:12px;padding:8px 16px;font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;letter-spacing:0.2px}
.conv-btn.learn-mode{background:#E3F2FD;color:#1565C0}
.name-btn{background:var(--orange-light);border:none;border-radius:12px;padding:8px 16px;font-size:12px;font-weight:700;color:var(--orange-text);cursor:pointer}

/* ── MAIN LAYOUT ── */
.main-layout{flex:1;display:flex;gap:0;overflow:hidden;position:relative}

/* ── LEFT COLUMN — lang cards + arrow ── */
.left-col{display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:14px 8px;width:60px;flex-shrink:0}
.lang-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:14px;padding:8px 6px;cursor:pointer;min-width:44px;text-align:center}
.lang-card.to-lang{background:var(--orange-light);color:var(--orange-text)}
.lang-card.from-lang{background:var(--blue-light);color:var(--blue-text)}
.lang-card.learn-mode{background:#E3F2FD;color:#1565C0}
.lang-card-code{font-size:16px;font-weight:900;letter-spacing:0.5px}
.lang-card-sub{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;opacity:0.7}
.mic-dot{font-size:12px;opacity:0;transition:opacity 0.3s;text-align:center;margin-top:2px}
.mic-dot.visible{opacity:1}
.arrow-btn{width:52px;height:90px;border-radius:14px;background:var(--blue-light);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--blue);transition:transform 0.4s ease;font-weight:900;line-height:1}
.arrow-btn.reversed{transform:rotate(180deg)}
.arrow-btn.disabled{opacity:0.2;cursor:default;pointer-events:none}

/* ── CENTER ZONE ── */
.center-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:10px 8px;position:relative}

/* Intervention zone */
.intervention-zone{display:flex;flex-direction:column;align-items:center;gap:6px;min-height:60px;justify-content:center;width:100%}
.intervention-label{font-size:11px;font-weight:700;opacity:0;transition:opacity 0.3s;border-radius:10px;padding:5px 14px;letter-spacing:0.3px;text-align:center}
.intervention-label.visible{opacity:1}
.action-row{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap}

/* Circle */
.circle-outer{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center}
.circle-bg{position:absolute;inset:-6px;border-radius:50%;background:conic-gradient(from 0deg,rgba(245,166,35,0.15),rgba(229,57,53,0.1),rgba(245,166,35,0.15));filter:blur(10px)}
.circle-card{width:190px;height:190px;border-radius:50%;background:var(--surface);box-shadow:0 8px 32px rgba(74,108,247,0.1),0 2px 8px rgba(0,0,0,0.05);display:flex;align-items:center;justify-content:center;position:relative;border:1.5px solid var(--border)}
.circle-svg{position:absolute;top:0;left:0;pointer-events:none;width:190px;height:190px}
.tap-zone{position:absolute;top:0;left:0;width:190px;height:190px;border-radius:50%;background:transparent;cursor:pointer;z-index:10}
.center-status{font-size:11px;color:var(--muted);text-align:center;font-weight:600;line-height:1.5;padding:0 8px}

@keyframes cw{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes ccw{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes waveExp{0%{opacity:0.5;r:40}100%{opacity:0;r:90}}
.arc-top{animation:ccw 6s linear infinite;transform-origin:95px 95px}
.arc-bottom{animation:cw 6s linear infinite;transform-origin:95px 95px}
.arc-top.fast,.arc-bottom.fast{animation-duration:1s}

/* Centre — cercle absolument positionné */
.center-zone{flex:1;display:block;position:relative;padding:4px 8px}
.intervention-zone{position:absolute;top:44px;left:0;right:0;height:68px;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:center;overflow:hidden;z-index:20;padding:4px 8px}
.help-zone-css{position:absolute;top:0;left:0;right:0;height:44px;display:flex;flex-direction:column;align-items:center;gap:3px;justify-content:center;padding:2px 8px;z-index:20;background:var(--bg)}
.circle-area{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:8px}
.conversation-zone{position:absolute;bottom:0;left:0;right:0;min-height:120px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:6px 0;justify-content:center;background:var(--bg);z-index:10}
.status-tag{border-radius:10px;padding:6px 14px;font-size:11px;font-weight:700;letter-spacing:0.3px;text-align:center;min-height:28px;display:inline-block}
.status-tag.active{color:var(--green-text);background:var(--green-light)}
.status-tag.learn{color:var(--blue-text);background:var(--blue-light)}
.status-tag.waiting{color:var(--muted);background:var(--neutral-light)}

/* ── RIGHT COLUMN ── */
.right-col{width:48px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:14px 8px}
.setup-card{width:36px;height:36px;border-radius:12px;background:var(--neutral-light);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted)}

/* ── ACTION BUTTONS ── */
.action-btn{border:none;border-radius:12px;font-size:13px;font-weight:700;padding:10px 18px;cursor:pointer;letter-spacing:0.2px;transition:opacity 0.15s;font-family:inherit}
.action-btn:active{opacity:0.8}
.action-btn.green{background:var(--green-light);color:var(--green-text)}
.action-btn.green.solid{background:linear-gradient(135deg,var(--green),var(--green-dark));color:white;box-shadow:0 4px 14px rgba(0,196,140,0.35)}
.action-btn.blue{background:var(--blue-light);color:var(--blue-text)}
.action-btn.blue.solid{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:white;box-shadow:0 4px 14px rgba(74,108,247,0.35)}
.action-btn.orange{background:var(--orange-light);color:var(--orange-text)}
.action-btn.red{background:var(--red-light);color:var(--red-text)}
.action-btn.neutral{background:var(--neutral-light);color:var(--neutral-text)}
/* compat */
.action-btn.primary{background:linear-gradient(135deg,var(--green),var(--green-dark));color:white;box-shadow:0 4px 14px rgba(0,196,140,0.3)}
.action-btn.danger{background:var(--red-light);color:var(--red-text)}
.action-btn.learn{background:var(--blue-light);color:var(--blue-text)}
.action-btn.learn.primary{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:white;box-shadow:0 4px 14px rgba(74,108,247,0.3)}

/* ── FIN BUTTON ── */
.fin-btn{display:none;background:var(--red-light);border:none;border-radius:12px;color:var(--red-text);font-size:12px;font-weight:700;padding:7px 16px;cursor:pointer;font-family:inherit}

/* ── TEXT PANEL ── */
.text-panel{position:absolute;top:68px;left:0;right:0;bottom:125px;z-index:5;border:1.5px solid #C7D5FF;overflow:hidden;background:var(--surface);display:none;flex-direction:column;box-shadow:0 2px 12px rgba(74,108,247,0.08)}
.text-panel.visible{display:flex}
.text-panel-top{flex:1;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);line-height:1.5;overflow-y:auto;min-height:0}
.text-panel-bot{flex:1;padding:8px 12px;font-size:13px;color:var(--blue-text);font-weight:600;line-height:1.5;overflow-y:auto;min-height:0;background:#F8F9FF}
.tp-lang{font-size:9px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}

/* ── TEXT INPUT ── */
.text-input-zone{display:none;width:100%;padding:0 4px}
.text-input-zone.visible{display:block}

/* ── MODE BAR ── */
.mode-bar{display:flex;justify-content:center;align-items:center;gap:10px;padding:10px 20px 14px;border-top:1px solid var(--line);flex-shrink:0;background:var(--surface)}
.mode-btn{font-size:12px;font-weight:700;letter-spacing:0.3px;cursor:pointer;padding:10px 22px;border:none;border-radius:14px;transition:all 0.2s;font-family:inherit}
.mode-btn.active-exchange{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:white;box-shadow:0 4px 14px rgba(74,108,247,0.3)}
.mode-btn.active-learn{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:white;box-shadow:0 4px 14px rgba(74,108,247,0.3)}
.mode-btn:not(.active-exchange):not(.active-learn){background:var(--neutral-light);color:var(--muted)}
.nav-spacer{height:44px;flex-shrink:0;background:var(--surface)}

/* ── CONV SCREEN ── */
#conv-screen{display:none;flex:1;flex-direction:column;overflow:hidden;pointer-events:all;min-height:0}
.cs-btn{background:var(--neutral-light);border:none;border-radius:12px;color:var(--text);font-size:12px;font-weight:700;padding:8px 14px;cursor:pointer;font-family:inherit}
.cs-btn:active{opacity:0.7}
.cs-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 16px;margin-bottom:8px;cursor:pointer;pointer-events:all;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.cs-item.selected{border-color:var(--blue);background:var(--blue-light)}

/* ── OVERLAYS ── */
.overlay{position:fixed;inset:0;background:#00000055;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
.overlay-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:24px;width:100%;max-width:380px;position:relative;max-height:80vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,0.12)}
.overlay-title{font-size:16px;font-weight:800;margin-bottom:16px}
.overlay-close{position:absolute;top:16px;right:20px;font-size:20px;color:var(--muted);cursor:pointer;width:32px;height:32px;background:var(--neutral-light);border-radius:8px;display:flex;align-items:center;justify-content:center;border:none;font-family:inherit}
.list-item{padding:12px 14px;border-radius:12px;cursor:pointer;font-size:14px}
.list-item:active,.list-item.selected{background:var(--blue-light)}
.list-item.selected{color:var(--blue);font-weight:700}
.setting-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:700}
.setting-row{margin-bottom:16px}
input[type=text],input[type=password]{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;color:var(--text);padding:11px 14px;font-size:14px;outline:none;font-family:inherit}
input:focus{border-color:var(--blue)}
.setting-btn{background:linear-gradient(135deg,var(--blue),var(--blue-dark));border:none;border-radius:12px;color:white;font-weight:700;font-size:14px;padding:12px 20px;cursor:pointer;width:100%;margin-top:6px;box-shadow:0 4px 14px rgba(74,108,247,0.3);font-family:inherit}
.lang-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;font-size:14px;cursor:pointer;text-align:left;color:var(--text);width:100%;margin-bottom:6px;font-family:inherit}
.lang-btn.sel{border-color:var(--blue);color:var(--blue);font-weight:700;background:var(--blue-light)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text);border-radius:14px;padding:10px 20px;font-size:13px;color:white;z-index:200;opacity:0;transition:opacity 0.3s;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.2);pointer-events:none}
.toast.show{opacity:1}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:#FAFBFF;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
#splash-logo{display:flex;align-items:center;gap:14px}
#splash-wordmark{font-size:42px;font-weight:900;letter-spacing:-1px;color:#1A2340}
#splash-tagline{font-size:12px;color:#8A96B4;letter-spacing:3px;text-transform:uppercase;opacity:0}
#splash-skip{position:absolute;bottom:40px;right:24px;font-size:12px;color:#C0C8D8;cursor:pointer;opacity:0}
/* Splash explosion */
@keyframes wordFlyUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(0.5)}
}
@keyframes circleGrow{
  0%{transform:scale(1);opacity:1}
  100%{transform:scale(3);opacity:0}
}
@keyframes splashCW {from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.splash-arc-top{animation:splashCCW 3s linear infinite;transform-origin:40px 40px}
.splash-arc-bot{animation:splashCW  3s linear infinite;transform-origin:40px 40px}
.splash-arc-top.fast{animation-duration:0.4s}
.splash-arc-bot.fast{animation-duration:0.4s}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div id="splash-logo">
    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none;overflow:visible">
      <g id="splash-arc-top" class="splash-arc-top">
        <path d="M40 6 A34 34 0 1 1 8 55" fill="none" stroke="#F5A623" stroke-width="6" stroke-linecap="round"/>
        <polygon points="8,55 1,42 14,45" fill="#F5A623"/>
      </g>
      <g id="splash-arc-bot" class="splash-arc-bot">
        <path d="M40 74 A34 34 0 1 1 72 25" fill="none" stroke="#E53935" stroke-width="6" stroke-linecap="round"/>
        <polygon points="72,25 79,38 66,35" fill="#E53935"/>
      </g>
    </svg>
    <div id="splash-wordmark">makedoo</div>
  </div>
  <div id="splash-tagline">Parlez · Traduisez · Apprenez</div>
  <div id="splash-skip" onclick="hideSplash()">Passer ›</div>
</div>

<!-- LOGO -->
<div class="logo-band" id="logo-band">
  <svg width="24" height="24" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none">
    <path d="M20 4 A16 16 0 1 1 5 24" fill="none" stroke="#F5A623" stroke-width="3.5" stroke-linecap="round"/>
    <polygon points="5,24 1,17 9,18" fill="#F5A623"/>
    <path d="M20 36 A16 16 0 1 1 35 16" fill="none" stroke="#E53935" stroke-width="3.5" stroke-linecap="round"/>
    <polygon points="35,16 39,23 31,22" fill="#E53935"/>
  </svg>
  <div class="logo-text">makedoo</div>
</div>

<!-- TOP BAR -->
<div class="top-bar" id="top-bar">
  <button class="conv-btn" id="btn-top-center" onclick="showTopCenter()">📋 Conversations</button>
</div>

<!-- MAIN -->
<div class="main-layout">

  <!-- LEFT COL -->
  <div class="left-col">
    <div>
      <div class="lang-card to-lang" id="lang-top-card" ontouchstart="startLP('changeLangTo')" ontouchend="cancelLP()" ontouchcancel="cancelLP()" onmousedown="startLP('changeLangTo')" onmouseup="cancelLP()" onmouseleave="cancelLP()">
        <div class="lang-card-code" id="lang-top">MK</div>
        <div class="lang-card-sub" id="lang-sub-top">Cible</div>
      </div>
      <div class="mic-dot" id="mic-top">🎤</div>
    </div>
    <div>
      <button class="arrow-btn" id="left-arrow" onclick="handleArrowClick()">↑</button>
    </div>
    <div>
      <div class="mic-dot" id="mic-bottom">🎤</div>
      <div class="lang-card from-lang" id="lang-bottom-card" ontouchstart="startLP('changeLangFrom')" ontouchend="cancelLP()" ontouchcancel="cancelLP()" onmousedown="startLP('changeLangFrom')" onmouseup="cancelLP()" onmouseleave="cancelLP()">
        <div class="lang-card-code" id="lang-bottom">FR</div>
        <div class="lang-card-sub" id="lang-sub-bot">Source</div>
      </div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center-zone">

    <!-- AIDE screen 0 -->
    <div id="help-zone" class="help-zone-css" style="display:none">
      <div id="help-lang" style="font-size:10px;color:var(--muted);text-align:center;font-weight:600;background:var(--blue-light);border-radius:8px;padding:3px 10px;width:100%"></div>
      <div id="help-arrow" style="font-size:10px;color:var(--muted);text-align:center;font-weight:600;background:var(--neutral-light);border-radius:8px;padding:3px 10px;width:100%"></div>
    </div>

    <!-- ZONE HAUTE -->
    <div class="intervention-zone">
      <div class="intervention-label" id="intervention-label"></div>
      <div class="action-row" id="action-row"></div>
    </div>

    <!-- SAISIE TEXTE SOLO -->
    <div class="text-input-zone" id="text-input-zone" style="position:absolute;top:116px;left:8px;right:8px;z-index:20;background:var(--bg);padding:4px 0">
      <div style="display:flex;gap:6px;align-items:center">
        <input type="text" id="text-lesson-input" placeholder="Tapez votre phrase…" style="flex:1">
        <button onclick="submitTextLesson()" style="background:linear-gradient(135deg,#00C48C,#00A878);border:none;border-radius:10px;color:white;font-weight:700;font-size:15px;padding:10px 14px;cursor:pointer">→</button>
      </div>
    </div>

    <!-- AIDE (screen 0 seulement) -->
    <!-- CERCLE -->
    <div class="circle-area" id="circle-container">
      <div class="circle-outer">
        <div class="circle-bg"></div>
        <div class="circle-card">
          <svg class="circle-svg" viewBox="0 0 190 190" xmlns="http://www.w3.org/2000/svg">
            <g id="arc-top" class="arc-top">
              <path d="M95 10 A85 85 0 1 1 14 138" fill="none" stroke="#F5A623" stroke-width="10" stroke-linecap="round"/>
              <polygon points="14,138 3,118 22,122" fill="#F5A623"/>
            </g>
            <g id="arc-bottom" class="arc-bottom">
              <path d="M95 180 A85 85 0 1 1 176 52" fill="none" stroke="#E53935" stroke-width="10" stroke-linecap="round"/>
              <polygon points="176,52 187,72 168,68" fill="#E53935"/>
            </g>
            <text id="mic-center" x="95" y="110" text-anchor="middle" font-size="48" style="opacity:0;transition:opacity 0.3s">🎤</text>
            <text id="hg-center" x="95" y="110" text-anchor="middle" font-size="48" style="opacity:0;transition:opacity 0.3s">⏳</text>
            <circle id="wave1" cx="95" cy="95" r="40" fill="none" stroke="#F5A623" stroke-width="1.5" opacity="0"/>
            <circle id="wave2" cx="95" cy="95" r="63" fill="none" stroke="#F5A623" stroke-width="1.5" opacity="0"/>
            <circle id="wave3" cx="95" cy="95" r="85" fill="none" stroke="#F5A623" stroke-width="1.5" opacity="0"/>
          <text id="welcome-text" x="95" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#1A2340" style="opacity:0;transition:opacity 0.5s"></text>
          </svg>
          <div class="tap-zone" onclick="handleTap()"></div>
        </div>
      </div>
      <div class="center-status" id="center-status"></div>
    </div>

    <!-- PANNEAU TEXTE -->
    <div class="text-panel" id="text-panel">
      <div class="text-panel-top" id="tp-top-wrap">
        <div class="tp-lang" id="tp-lang-top">FR</div>
        <div id="tp-text-orig"></div>
      </div>
      <div class="text-panel-bot" id="tp-bot-wrap">
        <div class="tp-lang" id="tp-lang-bot">MK</div>
        <div id="tp-text-trans"></div>
      </div>
    </div>

    <!-- ZONE BASSE -->
    <div class="conversation-zone">
      <div style="display:flex;align-items:center;gap:8px;justify-content:center;flex-shrink:0">
        <div class="status-tag waiting" id="status-pill"></div>
        <button class="fin-btn" id="fin-btn" onclick="confirmEnd()"><span id="fin-btn-label">Exit</span></button>
      </div>
      <div class="action-row" id="conv-action-row" style="flex-shrink:0"></div>
    </div>

  </div>

  <!-- RIGHT COL -->
  <div class="right-col">
    <button class="setup-card" ontouchstart="startLP('openSetup')" ontouchend="cancelLP()" ontouchcancel="cancelLP()" onmousedown="startLP('openSetup')" onmouseup="cancelLP()" onmouseleave="cancelLP()">⚙</button>
  </div>

</div>

<!-- CONV SCREEN -->
<div id="conv-screen">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);background:var(--surface);flex-shrink:0">

// ── Long press ─────────────────────────────────────────────────
function startLP(a){S.lpTimer=setTimeout(()=>execLP(a),750)}
function cancelLP(){clearTimeout(S.lpTimer)}
function execLP(a){
  if(a==='changeLangFrom')openLangPicker('from');
  else if(a==='changeLangTo')openLangPicker('to');
  else if(a==='openSetup')showOv('ov-setup');
}

// ── Mode ───────────────────────────────────────────────────────
function setMode(mode){
  if(S.screen!==0)return;
  S.mode=mode;
  const learn=mode==='learn';
  if(learn){S.direction='AB';S.currentSpeaker='A';document.getElementById('left-arrow').classList.remove('reversed')}
  document.getElementById('btn-exchange').className='mode-btn'+(mode==='exchange'?' active-exchange':'');
  document.getElementById('btn-learn').className='mode-btn'+(mode==='learn'?' active-learn':'');
  document.getElementById('left-arrow').classList.toggle('disabled',learn);
  ['lang-top-card','lang-bottom-card'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){
      if(learn){el.classList.remove('to-lang','from-lang');el.classList.add('learn-mode');}
      else{el.classList.remove('learn-mode');if(id==='lang-top-card')el.classList.add('to-lang');else el.classList.add('from-lang');}
    }
  });
  document.getElementById('btn-top-center').classList.toggle('learn-mode',learn);
  renderScreen();updateDisplay();updateUILabels();
}

// ── Arrow ──────────────────────────────────────────────────────
function handleArrowClick(){
  if(isLearn())return;
  S.direction=S.direction==='AB'?'BA':'AB';
  S.currentSpeaker=S.direction==='AB'?'A':'B';
  document.getElementById('left-arrow').classList.toggle('reversed',S.direction==='BA');
  if(S.screen===1&&S.listening)stopListening();
  if(S.screen===1)setScreen(1);
  else showToast(S.direction==='AB'?t('youFirst'):S.interlocutor+t('theyFirst'));
  S.ignoreTap=true;setTimeout(()=>S.ignoreTap=false,500);
  updateMicIndicators();
}

// ── Tap ────────────────────────────────────────────────────────
function handleTap(){
  if(S.ignoreTap)return;
  if(S.screen===1&&!S.listening)startListening();
  else if(S.screen===1&&S.listening)stopListening();
  else if(S.screen===2)doResume();
}

function showTopCenter(){isLearn()?showLessons():showConversations()}

  intLabel.className='intervention-label';intLabel.textContent='';

  if(hgC)hgC.style.opacity='0';
  const wt=document.getElementById('welcome-text');
  if(wt)wt.style.opacity='0';
  ['wave1','wave2','wave3'].forEach(id=>{const w=document.getElementById(id);if(w){w.style.animation='none';w.style.opacity='0'}});
  if(arcTop)arcTop.classList.remove('fast');
  if(arcBot)arcBot.classList.remove('fast');
  if(finBtn)finBtn.style.display='none';

  const learn=isLearn();
  const pillActive=learn?'status-pill learn':'status-pill active';
  const inProgress=learn?t('lessonProgress'):t('inProgress');

  // Cercle ou panneau texte
  const showPanel=learn&&(S.screen===2||S.screen===3);
  if(circleContainer)circleContainer.style.visibility=showPanel?'hidden':'visible';
  if(showPanel&&textPanel)textPanel.classList.add('visible');
  else if(textPanel)textPanel.classList.remove('visible');

  // Zone d'aide — screen 0 uniquement
  const helpZone=document.getElementById('help-zone');
  const helpLang=document.getElementById('help-lang');
  const helpArrow=document.getElementById('help-arrow');
  if(helpZone){
    helpZone.style.display=S.screen===0?'flex':'none';
    if(helpLang)helpLang.textContent=t('longPressLang');
    if(helpArrow)helpArrow.textContent=isLearn()?'':t('clickArrow');
  }
  // Placeholder du champ texte — indique retranslation possible
  const textInput=document.getElementById('text-lesson-input');
  if(textInput){
    if(S.screen===2&&S.lastOriginal&&isLearn()){
      textInput.placeholder='→ '+S.lastOriginal.substring(0,30)+(S.lastOriginal.length>30?'…':'');
    } else {
      textInput.placeholder=t('typePhrase')||'Type your phrase…';
    }
  }

  // Zone texte (mode learn, screens 0 et 1)
  if(textZone){
    const show=learn&&S.screen===1;
    textZone.style.display=show?'block':'none';
  }

  if(S.screen===0){
    status.textContent='';
    // Message de bienvenue — première ouverture uniquement
    const wt=document.getElementById('welcome-text');
    if(wt){
      if(!S.welcomeShown){
        const lines=t('welcome').split('\n');
        wt.innerHTML=lines.map((l,i)=>'<tspan x="95" dy="'+(i===0?'0':'22')+'">'+l+'</tspan>').join('');
        wt.style.opacity='1';
      } else {
        wt.style.opacity='0';
      }
    }
    convActions.innerHTML='<button class="action-btn green solid" onclick="startSession()">▶ '+(learn?t('startLesson'):t('startConv'))+'</button>';

  }else if(S.screen===1&&!S.listening){
    if(micC)micC.style.opacity='1';
    status.textContent=t('clickTalk');
    pill.className=(learn?'status-tag learn':'status-tag active');
    pill.textContent='💬 '+inProgress;
    if(!learn){
      convActions.innerHTML=(S.currentExchanges.length>0?'<button class="action-btn blue solid" onclick="doSave()">'+t('save')+'</button>':'')+'<button class="action-btn red" onclick="doExitConv()">'+t('exit')+'</button>';
    }
    // SOLO : Exit visible seulement si 0 échange (démarrage par erreur)
    if(finBtn)finBtn.style.display=(learn&&S.currentExchanges.length===0)?'inline-flex':'none';

  }else if(S.screen===1&&S.listening){
    if(arcTop)arcTop.classList.add('fast');
    if(arcBot)arcBot.classList.add('fast');
    if(micC)micC.style.opacity='1';
    ['wave1','wave2','wave3'].forEach((id,i)=>{const w=document.getElementById(id);if(w)w.style.animation='waveExp 1.8s ease-out infinite '+(i*0.4)+'s'});
    status.textContent=t('clickStop');
    pill.className=(learn?'status-tag learn':'status-tag active');
    pill.textContent='💬 '+inProgress;
    if(!learn){
      convActions.innerHTML=(S.currentExchanges.length>0?'<button class="action-btn blue solid" onclick="doSave()">'+t('save')+'</button>':'')+'<button class="action-btn red" onclick="doExitConv()">'+t('exit')+'</button>';
    }
    // Masquer Exit pendant l'enregistrement en SOLO
    if(finBtn)finBtn.style.display='none';
    updateMicIndicators();

  }else if(S.screen===2){
    if(learn){
      if(finBtn)finBtn.style.display='none';
      intLabel.textContent=t('choosePhrase');
      intLabel.classList.add('visible');
      intLabel.style.cssText='opacity:1;background:#E3F2FD;border-radius:20px;padding:5px 14px;font-size:12px;color:var(--learn);font-weight:700;width:100%;text-align:center';
      intActions.innerHTML='<button class="action-btn learn" onclick="doRepeatSelected()">'+t('repeat')+'</button><button class="action-btn learn" onclick="doReplaceSelected()">'+t('replace')+'</button>';
      // ZONE BASSE : bandeau + boutons
      pill.className=(learn?'status-tag learn':'status-tag active');
      
      pill.textContent='💬 '+inProgress;
      convActions.innerHTML='<button class="action-btn green solid" onclick="doResume()">'+t('resume')+'</button><button class="action-btn learn" onclick="doSaveLesson()">'+t('save')+'</button><button class="action-btn red" onclick="confirmEnd()">'+t('exit')+'</button>';
    }else{
      intLabel.textContent='🔊 '+t('oralTrans');
      intLabel.classList.add('visible');
      intLabel.style.cssText='opacity:1;background:#E8F5F3;border-radius:20px;padding:5px 14px;font-size:12px;color:var(--accent);font-weight:700;width:100%;text-align:center';
      intActions.innerHTML='<button class="action-btn green solid" onclick="doRepeat()">🔊 '+t('repeat')+'</button>';
      status.textContent=t('clickTalk');
      pill.className=(learn?'status-tag learn':'status-tag active');
      pill.textContent='💬 '+inProgress;
      convActions.innerHTML='<button class="action-btn primary" onclick="doSave()">'+t('save')+'</button><button class="action-btn danger" onclick="doExitConv()">'+t('exit')+'</button>';
      if(finBtn)finBtn.style.display='none';
    }

  }else if(S.screen===3){
    // Screen 3 only used for learn save dialog now
    if(learn){
      pill.className='status-tag warning';pill.textContent=t('lessonEnded');
      convActions.innerHTML='<button class="action-btn learn" onclick="doResume()">'+t('resume')+'</button><button class="action-btn learn primary" onclick="doSaveLesson()">'+t('save')+'</button><button class="action-btn red" onclick="confirmEnd()">'+t('exit')+'</button>';
    }
  }
  updateUILabels();
  updateMicIndicators();
}

// ── Session ────────────────────────────────────────────────────

  S.currentExchanges=[];
  selectedPhraseIdx=-1;selectedPhraseIdxs.clear();
  document.getElementById('tp-text-orig').innerHTML='';
  document.getElementById('tp-text-trans').innerHTML='';
  setScreen(1);
}
function endSession(){
  if(S.listening){if(recognition)recognition.abort();if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();S.listening=false}
  setScreen(3);
}
function confirmEnd(){
  if(S.currentExchanges.length===0){
    if(S.listening){if(recognition)recognition.abort();if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();S.listening=false;}

function doResume(){

function doRepeatLearn(){if(S.lastTranslation)speakText(S.lastTranslation,S.lastTranslationLang)}

// Sélection multiple de phrases
let selectedPhraseIdx=-1;
let selectedPhraseIdxs=new Set();

function selectPhrase(idx){
  // Toggle sélection
  if(selectedPhraseIdxs.has(idx))selectedPhraseIdxs.delete(idx);
  else selectedPhraseIdxs.add(idx);
  selectedPhraseIdx=idx; // Dernière sélectionnée
  // Surligner toutes les phrases sélectionnées
  document.querySelectorAll('.tp-phrase').forEach(el=>{
    const i=parseInt(el.dataset.idx);
    el.style.background=selectedPhraseIdxs.has(i)?'#BBDEFB':'';
  });
}

function doRepeatSelected(){
  const idxs=selectedPhraseIdxs.size>0?[...selectedPhraseIdxs].sort():[S.currentExchanges.length-1];
  (async()=>{
    for(const i of idxs){
      const ex=S.currentExchanges[i];
      if(ex)await speakText(ex.translated,ex.langTo||S.langTo);
    }
  })();
  // Reste sur screen 2
}

function doReplaceSelected(){
  const idxs=selectedPhraseIdxs.size>0?[...selectedPhraseIdxs].sort((a,b)=>b-a):[S.currentExchanges.length-1];
  // Supprimer par index décroissant
  idxs.forEach(i=>{if(i>=0&&i<S.currentExchanges.length)S.currentExchanges.splice(i,1)});
  selectedPhraseIdxs.clear();selectedPhraseIdx=-1;
  // Re-rendre le panneau texte
  const oe=document.getElementById('tp-text-orig');const te=document.getElementById('tp-text-trans');
  oe.innerHTML='';te.innerHTML='';
  const sep='<div style="border-top:1px solid var(--border);margin:4px 0"></div>';
  S.currentExchanges.forEach((ex,i)=>{
    oe.innerHTML+=(oe.innerHTML?sep:'')+'<div class="tp-phrase" data-idx="'+i+'" onclick="selectPhrase('+i+')" style="padding:2px 4px;border-radius:4px;cursor:pointer">'+ex.original+'</div>';
    te.innerHTML+=(te.innerHTML?sep:'')+'<div class="tp-phrase" data-idx="'+i+'" onclick="selectPhrase('+i+')" style="padding:2px 4px;border-radius:4px;cursor:pointer">'+ex.translated+'</div>';
  });
  if(S.currentExchanges.length>0){const last=S.currentExchanges[S.currentExchanges.length-1];S.lastTranslation=last.translated;S.lastTranslationLang=last.langTo||S.langTo;}
  setScreen(2);
}
function doSave(){
  if(S.currentExchanges.length===0){setScreen(0);return;}
  document.getElementById('conv-name-input').value='';
  document.getElementById('conv-date').textContent=new Date().toLocaleDateString()+' · '+S.location;
  showOv('ov-save-conv');
}
function confirmSaveConv(){

  showOv('ov-save-lesson');
}
function confirmSaveLesson(){

  S.lessons.unshift({id:Date.now(),name,date:new Date().toISOString().split('T')[0],langFrom:S.langFrom,langTo:S.langTo,count:S.currentExchanges.length,exchanges:[...S.currentExchanges]});

function doExit(){S.currentExchanges=[];setScreen(0)}

async function submitTextLesson(){
  const input=document.getElementById('text-lesson-input');
  let text=input.value.trim();
  // Si champ vide et phrase précédente en mémoire → retraduit dans la nouvelle langue
  if(!text&&S.lastOriginal&&S.screen===2){

  }

// ── Recognition ────────────────────────────────────────────────
let recognition=null,mediaRecorder=null,audioChunksSTT=[];

function startListening(){
  const isB=isLearn()?false:(S.currentSpeaker==='B');
  const fromLang=isB?S.langTo:S.langFrom;
  const toLang=isB?S.langFrom:S.langTo;
  const langMap={fr:'fr-FR',mk:'mk-MK',en:'en-US',es:'es-ES',de:'de-DE',it:'it-IT',ar:'ar-XA',sq:'sq-AL',sr:'sr-RS',tr:'tr-TR',el:'el-GR',bg:'bg-BG'};
  const recogLang=langMap[fromLang]||'fr-FR';
  S.listening=true;setScreen(1);
  startCloudSTT(fromLang,toLang,recogLang);
}

function startWebSpeech(recogLang,fromLang,toLang){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('Reconnaissance vocale non disponible');return}
  recognition=new SR();recognition.lang=recogLang;recognition.interimResults=false;recognition.continuous=false;
  let acc='';
  recognition.onresult=e=>{acc+=' '+e.results[0][0].transcript};
  recognition.onerror=e=>{if(e.error==='no-speech'&&S.listening){try{recognition.start()}catch(err){}return}S.listening=false;setScreen(S.currentExchanges.length>0?2:0)};
  recognition.onend=()=>{if(S.listening){try{recognition.start()}catch(err){}}else{const text=acc.trim();if(!text){setScreen(S.currentExchanges.length>0?2:0);return}finishListening(text,fromLang,toLang)}};
  recognition.start();
}

async function startCloudSTT(fromLang,toLang,recogLang){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
    audioChunksSTT=[];
    const mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
    mediaRecorder=new MediaRecorder(stream,{mimeType});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunksSTT.push(e.data)};
    mediaRecorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      if(!audioChunksSTT.length){setScreen(S.currentExchanges.length>0?2:0);return}
      const micC=document.getElementById('mic-center');
      const hgC=document.getElementById('hg-center');
      if(micC)micC.style.opacity='0';if(hgC)hgC.style.opacity='1';
      updateMicIndicators();
      const blob=new Blob(audioChunksSTT,{type:mimeType});
      const reader=new FileReader();
      reader.onloadend=async()=>{
        const base64=reader.result.split(',')[1];
        try{
          const res=await fetch(API_BASE+'/stt',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({audio:base64,languageCode:recogLang})});
          const data=await res.json();
          const text=data.transcript||'';
          if(text)finishListening(text,fromLang,toLang);
          else{if(hgC)hgC.style.opacity='0';if(micC)micC.style.opacity='1';setScreen(1);}
        }catch(e){showToast(t('sttFail'));setScreen(S.currentExchanges.length>0?2:0)}
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.start();
  }catch(e){showToast(t('micError'));S.listening=false;setScreen(0)}
}

function stopListening(){
  S.listening=false;
  if(recognition){recognition.stop();recognition=null}
  if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();
  ['wave1','wave2','wave3'].forEach(id=>{const w=document.getElementById(id);if(w){w.style.animation='none';w.style.opacity='0'}});
  const at=document.getElementById('arc-top');const ab=document.getElementById('arc-bottom');
  if(at)at.classList.remove('fast');if(ab)ab.classList.remove('fast');
}

function finishListening(text,fromLang,toLang){
  const micC=document.getElementById('mic-center');const hgC=document.getElementById('hg-center');
  const at=document.getElementById('arc-top');const ab=document.getElementById('arc-bottom');
  if(micC)micC.style.opacity='0';if(hgC)hgC.style.opacity='1';
  ['wave1','wave2','wave3'].forEach(id=>{const w=document.getElementById(id);if(w){w.style.animation='none';w.style.opacity='0'}});
  if(at)at.classList.remove('fast');if(ab)ab.classList.remove('fast');
  updateMicIndicators();
  translateAndSpeak(text,fromLang,toLang);
}

// ── Translate & Speak ──────────────────────────────────────────
async function translateAndSpeak(text,fromLang,toLang){
  let translated=text;
  try{
    const res=await fetch(API_BASE+'/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,source:fromLang,target:toLang})});
    const data=await res.json();
    if(data.translated)translated=data.translated;
  }catch(e){}
  S.currentExchanges.push({original:text,translated,langFrom:fromLang,langTo:toLang});
  S.lastTranslation=translated;S.lastTranslationLang=toLang;S.lastOriginal=text;
  if(isLearn()){
    const lf=LANGS.find(l=>l.code===fromLang);const lt=LANGS.find(l=>l.code===toLang);
    document.getElementById('tp-lang-top').textContent=lf?lf.display:fromLang.toUpperCase();
    document.getElementById('tp-lang-bot').textContent=lt?lt.display:toLang.toUpperCase();
    const sep='<div style="border-top:1px solid var(--border);margin:4px 0"></div>';
    const oe=document.getElementById('tp-text-orig');const te=document.getElementById('tp-text-trans');
    const idx=S.currentExchanges.length-1;
    oe.innerHTML+=(oe.innerHTML?sep:'')+'<div class="tp-phrase" data-idx="'+idx+'" onclick="selectPhrase('+idx+')" style="padding:2px 4px;border-radius:4px;cursor:pointer">'+text+'</div>';
    te.innerHTML+=(te.innerHTML?sep:'')+'<div class="tp-phrase" data-idx="'+idx+'" onclick="selectPhrase('+idx+')" style="padding:2px 4px;border-radius:4px;cursor:pointer">'+translated+'</div>';
    // Scroller vers le bas immédiatement
    setTimeout(()=>{
      const tp=document.getElementById('tp-top-wrap');const tb=document.getElementById('tp-bot-wrap');
      if(tp)tp.scrollTop=tp.scrollHeight;if(tb)tb.scrollTop=tb.scrollHeight;
    },50);
  }
  setScreen(2); // Avant speakText pour éviter les inversions
  // Cacher la zone de saisie texte
  const tz=document.getElementById('text-input-zone');
  if(tz)tz.style.display='none';
  await speakText(translated,toLang);
}

async function speakText(text,langCode){
  const langMap={fr:'fr-FR',mk:'mk-MK',en:'en-US',es:'es-ES',de:'de-DE',it:'it-IT',ar:'ar-XA',sq:'sq-AL',sr:'sr-RS',tr:'tr-TR',el:'el-GR',bg:'bg-BG'};
  const lc=langMap[langCode]||'fr-FR';
  try{
    const res=await fetch(API_BASE+'/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,languageCode:lc,speakingRate:0.85})});
    const data=await res.json();
    if(data.audioContent){await playAudio('data:audio/mp3;base64,'+data.audioContent);return}
  }catch(e){}
  return new Promise(resolve=>{
    const utt=new SpeechSynthesisUtterance(text);utt.lang=lc;utt.rate=0.85;
    if(S.selectedVoiceURI&&langCode===S.langTo){const v=speechSynthesis.getVoices().find(v=>v.voiceURI===S.selectedVoiceURI);if(v){utt.voice=v;utt.lang=S.selectedVoiceLang||lc}}
    utt.onend=resolve;window.speechSynthesis.cancel();window.speechSynthesis.speak(utt);
  });
}
function playAudio(src){return new Promise(resolve=>{const a=new Audio(src);a.onended=resolve;a.onerror=resolve;a.play()})}

// ── Mic indicators ─────────────────────────────────────────────
function updateMicIndicators(){
  const mt=document.getElementById('mic-top');const mb=document.getElementById('mic-bottom');
  mt.classList.remove('visible');mb.classList.remove('visible');
  if(S.screen===3)return;
  if(isLearn()){if(S.screen>=0)mb.classList.add('visible');return}
  if(S.direction==='AB')mb.classList.add('visible');else mt.classList.add('visible');
}

function selectEntry(idx){
  const data=convViewMode?S.lessons:S.journal;
  selectedEntry=data[idx];S.reviewOpen=false;isPlayingConv=false;
  renderConvScreen();
}

function resumeLesson(){
  if(!selectedEntry)return;
  S.langFrom=selectedEntry.langFrom||'fr';S.langTo=selectedEntry.langTo||'mk';
  S.currentExchanges=[...selectedEntry.exchanges];
  S.lastTranslation=selectedEntry.exchanges[selectedEntry.exchanges.length-1]&&selectedEntry.exchanges[selectedEntry.exchanges.length-1].translated||null;
  S.lastTranslationLang=selectedEntry.langTo||'mk';
  const oe=document.getElementById('tp-text-orig');const te=document.getElementById('tp-text-trans');
  oe.innerHTML='';te.innerHTML='';
  const sep='<div style="border-top:1px solid var(--border);margin:4px 0"></div>';
  selectedEntry.exchanges.forEach((e,i)=>{
    oe.innerHTML+=(oe.innerHTML?sep:'')+'<div class="tp-phrase" data-idx="'+i+'" onclick="selectPhrase('+i+')" style="padding:2px 4px;border-radius:4px;cursor:pointer">'+e.original+'</div>';
    te.innerHTML+=(te.innerHTML?sep:'')+'<div class="tp-phrase" data-idx="'+i+'" onclick="selectPhrase('+i+')" style="padding:2px 4px;border-radius:4px;cursor:pointer">'+e.translated+'</div>';
  });
  const lf=LANGS.find(l=>l.code===S.langFrom);const lt=LANGS.find(l=>l.code===S.langTo);
  document.getElementById('tp-lang-top').textContent=lf?lf.display:S.langFrom.toUpperCase();
  document.getElementById('tp-lang-bot').textContent=lt?lt.display:S.langTo.toUpperCase();
  S.screen=0;S.mode='learn';selectedPhraseIdx=-1;selectedPhraseIdxs.clear();
  document.getElementById('btn-exchange').className='mode-btn';
  document.getElementById('btn-learn').className='mode-btn active-learn';
  document.getElementById('left-arrow').classList.add('disabled');
  ['lang-top-card','lang-bottom-card'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.classList.remove('to-lang','from-lang');el.classList.add('learn-mode');}
  });
  document.getElementById('btn-top-center').classList.add('learn-mode');
  hideConvScreen();
  updateDisplay();
  setScreen(2);
}

function renameLesson(){
  if(!selectedEntry)return;
  const newName=prompt('Nouveau nom :',selectedEntry.name||'Leçon');
  if(!newName||newName===selectedEntry.name)return;
  selectedEntry.name=newName;
  const idx=S.lessons.findIndex(l=>l.id===selectedEntry.id);
  if(idx>=0){S.lessons[idx].name=newName;localStorage.setItem('mk_v3_lessons',JSON.stringify(S.lessons))}
  showToast('✓ '+newName);renderConvScreen();
}

function deleteEntry(){
  if(!selectedEntry)return;
  if(!confirm(t('deleteConfirm')))return;
  if(convViewMode){S.lessons=S.lessons.filter(e=>e.id!==selectedEntry.id);localStorage.setItem('mk_v3_lessons',JSON.stringify(S.lessons))}
  else{S.journal=S.journal.filter(e=>e.id!==selectedEntry.id);localStorage.setItem('mk_v3_journal',JSON.stringify(S.journal))}
  selectedEntry=null;renderConvScreen();showToast('🗑 Supprimé');
}

async function listenEntry(){
  if(!selectedEntry||isPlayingConv)return;
  isPlayingConv=true;
  const btn=document.getElementById('cs-listen');
  if(btn){btn.textContent='⏹ '+t('stop');btn.onclick=()=>{isPlayingConv=false;if(btn){btn.textContent='🔊 '+t('listen');btn.onclick=listenEntry}}}

  // Grouper par phrase originale
  const groups=[];
  for(const ex of selectedEntry.exchanges){
    const last=groups[groups.length-1];
    if(last&&last.original===ex.original&&last.langFrom===ex.langFrom){
      last.translations.push({text:ex.translated,lang:ex.langTo});
    } else {
      groups.push({original:ex.original,langFrom:ex.langFrom,translations:[{text:ex.translated,lang:ex.langTo}]});
    }
  }

  for(const group of groups){
    if(!isPlayingConv)break;
    await speakText(group.original,group.langFrom);
    for(const tr of group.translations){
      if(!isPlayingConv)break;
      await new Promise(r=>setTimeout(r,300));
      await speakText(tr.text,tr.lang);
    }
    if(!isPlayingConv)break;
    await new Promise(r=>setTimeout(r,600));
  }
  isPlayingConv=false;
  const b=document.getElementById('cs-listen');
  if(b){b.textContent='🔊 '+t('listen');b.onclick=listenEntry}
}

async function exportEntry(){
  if(!selectedEntry)return;
  const btn=document.getElementById('cs-export')||document.querySelector('[onclick="exportEntry()"]');
  if(btn)btn.textContent='⏳…';
  const langMap={fr:'fr-FR',mk:'mk-MK',en:'en-US',es:'es-ES',de:'de-DE',it:'it-IT',ar:'ar-XA',sq:'sq-AL',sr:'sr-RS',tr:'tr-TR',el:'el-GR',bg:'bg-BG'};
  const chunks=[];

  // Grouper les échanges par phrase originale
  const groups=[];
  for(const ex of selectedEntry.exchanges){
    const last=groups[groups.length-1];
    if(last&&last.original===ex.original&&last.langFrom===ex.langFrom){
      // Même phrase originale → ajouter juste la traduction
      last.translations.push({text:ex.translated,lang:ex.langTo});
    } else {
      groups.push({original:ex.original,langFrom:ex.langFrom,translations:[{text:ex.translated,lang:ex.langTo}]});
    }
  }

  const ttsCall=async(text,lang)=>{
    try{
      const res=await fetch(API_BASE+'/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,languageCode:langMap[lang]||'en-US',speakingRate:0.85})});
      const data=await res.json();
      if(data.audioContent){const bytes=atob(data.audioContent);const arr=new Uint8Array(bytes.length);for(let i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);chunks.push(arr)}
    }catch(e){}
  };

  for(const group of groups){
    // Phrase originale — une seule fois
    await ttsCall(group.original,group.langFrom);
    // Toutes les traductions
    for(const tr of group.translations){
      await ttsCall(tr.text,tr.lang);
    }
  }

  if(chunks.length){
    const total=chunks.reduce((s,a)=>s+a.length,0);const merged=new Uint8Array(total);let off=0;chunks.forEach(a=>{merged.set(a,off);off+=a.length});
    const blob=new Blob([merged],{type:'audio/mpeg'});const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='makedoo_'+(selectedEntry.name||'export')+'_'+selectedEntry.date+'.mp3';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    showToast('✓ MP3 '+t('export'));
  }else showToast('Export échoué');
  if(btn)btn.textContent='⬇ '+t('export');
}

async function exportDocx(){
  if(!selectedEntry)return;

  // Grouper par phrase originale (même logique que MP3)
  const groups=[];
  for(const ex of selectedEntry.exchanges){
    const last=groups[groups.length-1];
    if(last&&last.original===ex.original&&last.langFrom===ex.langFrom){
      last.translations.push({text:ex.translated,lang:ex.langTo});
    } else {
      groups.push({original:ex.original,langFrom:ex.langFrom,translations:[{text:ex.translated,lang:ex.langTo}]});
    }
  }

  // Détecter si multilingue
  const maxTrans=Math.max(...groups.map(g=>g.translations.length));
  const isMulti=maxTrans>1;

  // Générer le HTML pour conversion en DOCX via Blob
  const name=selectedEntry.name||'Leçon';
  const date=new Date(selectedEntry.date).toLocaleDateString();

  let tableRows='';
  if(isMulti){
    // Entête colonnes langues
    const langs=[...new Set(selectedEntry.exchanges.map(e=>e.langTo))];
    const headers='<tr><th style="background:#4A6CF7;color:white;padding:8px 12px;text-align:left">'+selectedEntry.langFrom.toUpperCase()+'</th>'
      +langs.map(l=>'<th style="background:#4A6CF7;color:white;padding:8px 12px;text-align:left">'+l.toUpperCase()+'</th>').join('')+'</tr>';
    tableRows=headers+groups.map(g=>{
      const cells=langs.map(l=>{
        const tr=g.translations.find(t=>t.lang===l);
        return '<td style="padding:8px 12px;border-bottom:1px solid #eee">'+(tr?tr.text:'—')+'</td>';
      }).join('');
      return '<tr><td style="padding:8px 12px;border-bottom:1px solid #eee;font-weight:600">'+g.original+'</td>'+cells+'</tr>';
    }).join('');
  } else {
    tableRows='<tr><th style="background:#4A6CF7;color:white;padding:8px 12px;text-align:left">'+selectedEntry.langFrom.toUpperCase()+'</th>'
      +'<th style="background:#4A6CF7;color:white;padding:8px 12px;text-align:left">'+(selectedEntry.langTo||'').toUpperCase()+'</th></tr>'
      +groups.map(g=>'<tr>'
        +'<td style="padding:8px 12px;border-bottom:1px solid #eee;font-weight:600">'+g.original+'</td>'
        +'<td style="padding:8px 12px;border-bottom:1px solid #eee">'+( g.translations[0]?.text||'')+'</td>'
        +'</tr>').join('');
  }

  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
  <head><meta charset="UTF-8"><title>${name}</title>
  <style>body{font-family:Calibri,sans-serif;margin:40px}h1{color:#1A2340;font-size:20px}h2{color:#4A6CF7;font-size:13px;font-weight:normal}table{border-collapse:collapse;width:100%;margin-top:20px}td,th{border:1px solid #ddd}</style>
  </head><body>
  <h1>📖 ${name}</h1>
  <h2>📅 ${date} · 📍 ${selectedEntry.location||''} · ${groups.length} phrase(s)</h2>
  <table>${tableRows}</table>
  </body></html>`;

  const blob=new Blob(['\ufeff'+html],{type:'application/msword'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='makedoo_'+name+'_'+selectedEntry.date+'.docx';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('📄 Document téléchargé');
}

function exportPdf(format='C'){
  if(!selectedEntry)return;
  const groups=[];
  for(const ex of selectedEntry.exchanges){
    const last=groups[groups.length-1];
    if(last&&last.original===ex.original&&last.langFrom===ex.langFrom){
      last.translations.push({text:ex.translated,lang:ex.langTo});
    } else {
      groups.push({original:ex.original,langFrom:ex.langFrom,translations:[{text:ex.translated,lang:ex.langTo}]});
    }
  }
  const name=selectedEntry.name||'Session';
  const date=new Date(selectedEntry.date).toLocaleDateString();
  const langs=[...new Set(selectedEntry.exchanges.map(e=>e.langTo))];
  const isMulti=langs.length>1;

  let body='';

  if(format==='C'){
    // PDF-C : tableau colonnes
    let tableRows='';
    if(isMulti){
      tableRows='<tr><th>'+selectedEntry.langFrom.toUpperCase()+'</th>'+langs.map(l=>'<th>'+l.toUpperCase()+'</th>').join('')+'</tr>'
        +groups.map(g=>'<tr><td class="orig">'+g.original+'</td>'+langs.map(l=>{const tr=g.translations.find(t=>t.lang===l);return'<td>'+(tr?tr.text:'—')+'</td>';}).join('')+'</tr>').join('');
    } else {
      tableRows='<tr><th>'+selectedEntry.langFrom.toUpperCase()+'</th><th>'+(selectedEntry.langTo||'').toUpperCase()+'</th></tr>'
        +groups.map(g=>'<tr><td class="orig">'+g.original+'</td><td>'+(g.translations[0]?.text||'')+'</td></tr>').join('');
    }
    body='<table>'+tableRows+'</table>';
  } else {
    // PDF-L : phrases empilées avec séparateurs
    body=groups.map(g=>{
      const orig='<div class="phrase-orig">'+g.original+'</div>';
      const trans=g.translations.map(t=>'<div class="phrase-trans"><span class="lang-badge">'+t.lang.toUpperCase()+'</span> '+t.text+'</div>').join('');
      return '<div class="phrase-block">'+orig+trans+'</div>';
    }).join('<hr class="phrase-sep">');
  }

  const css=format==='C'
    ?'table{border-collapse:collapse;width:100%}th{background:#4A6CF7;color:white;padding:10px 14px;text-align:left}td{padding:10px 14px;border-bottom:1px solid #eee}td.orig{font-weight:700}tr:nth-child(even) td{background:#F8F9FF}'
    :'.phrase-block{margin:16px 0;padding:8px 0}.phrase-orig{font-size:16px;font-weight:700;color:#1A2340;margin-bottom:8px}.phrase-trans{font-size:15px;color:#2D4FBF;margin:4px 0;padding-left:12px}.lang-badge{display:inline-block;background:#4A6CF7;color:white;font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px;margin-right:8px}.phrase-sep{border:none;border-top:2px solid #E4E8F5;margin:8px 0}';

  const html='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:Calibri,Arial,sans-serif;margin:30px;color:#1A2340}h1{font-size:22px;margin-bottom:4px}.meta{color:#8A96B4;font-size:13px;margin-bottom:24px}'+css+'@media print{body{margin:15px}}</style><title>'+name+'</title></head><body>'
    +'<h1>📖 '+name+' <span style="font-size:13px;color:#8A96B4;font-weight:normal">PDF-'+format+'</span></h1>'
    +'<div class="meta">📅 '+date+' · 📍 '+(selectedEntry.location||'')+' · '+groups.length+' phrase(s)</div>'
    +body
    +'<script>window.onload=function(){window.print()}<\/script></body></html>';

  const w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();}
  else showToast('Autorisez les popups pour le PDF');
}

function selectLang(code){
  if(S.langPickerTarget==='from'){
    S.langFrom=code;

    const supported=['fr','en','mk','es','de'];

      S.uiLang=code;
      localStorage.setItem('makedoo_v3_uilang',code);

function scanVoices(){
  const listEl=document.getElementById('voice-list');listEl.innerHTML='⏳ Scan…';
  const doScan=()=>{
    const all=speechSynthesis.getVoices();
    const mk=all.filter(v=>v.lang.startsWith('mk')||v.lang.startsWith('hr')||v.lang.startsWith('sr'));
    if(mk.length===0){listEl.innerHTML='<div style="color:#E53935">'+t('noVoices')+'</div>';return}
    listEl.innerHTML=mk.map(v=>'<div style="background:#F0F4F8;border-radius:8px;padding:8px 10px;margin-bottom:6px;cursor:pointer;border:1.5px solid '+(S.selectedVoiceURI===v.voiceURI?'var(--learn)':'var(--border)')+'" onclick="testVoice(\''+v.voiceURI.replace(/'/g,"\\'")+'\',' +'\''+v.lang+'\',\''+v.name.replace(/'/g,"\\'")+'\')"><div style="font-weight:700;font-size:13px">'+v.name+'</div><div style="font-size:11px;color:var(--muted)">'+v.lang+' · '+(v.localService?'🟢 Local':'🌐 Réseau')+'</div><div style="font-size:11px;color:var(--learn)">▶ Appuyer pour tester</div></div>').join('');
  };
  if(speechSynthesis.getVoices().length>0)doScan();else{speechSynthesis.onvoiceschanged=doScan;setTimeout(doScan,1500)}
}

function testVoice(uri,lang,name){
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance('Здраво, јас сум Makedoo');
  const voice=speechSynthesis.getVoices().find(v=>v.voiceURI===uri);
  if(voice)utt.voice=voice;utt.lang=lang;utt.rate=0.85;
  window.speechSynthesis.speak(utt);
  S.selectedVoiceURI=uri;S.selectedVoiceLang=lang;
  localStorage.setItem('makedoo_v3_voice_uri',uri);localStorage.setItem('makedoo_v3_voice_lang',lang);
  showToast('✓ '+name);scanVoices();
}

  document.getElementById('btn-top-center').textContent=isLearn()?t('lessons'):t('conv');
  document.getElementById('btn-exchange').textContent='DUO';
  document.getElementById('btn-learn').textContent='SOLO';
  // Lang card sub labels
  const lsTop=document.getElementById('lang-sub-top');
  const lsBot=document.getElementById('lang-sub-bot');
  if(lsTop)lsTop.textContent=t('target');
  if(lsBot)lsBot.textContent=t('source');
  // Help text
  const helpLang=document.getElementById('help-lang');
  const helpArrow=document.getElementById('help-arrow');
  if(helpLang)helpLang.textContent=t('longPressLang');
  if(helpArrow)helpArrow.textContent=isLearn()?'':t('clickArrow');
  // Fin/Exit button
  const finLabel=document.getElementById('fin-btn-label');
  if(finLabel)finLabel.textContent=t('exit');
  // Conv screen exit button
  const exitBtn=document.querySelector('#conv-screen .cs-btn');
  if(exitBtn)exitBtn.textContent=t('exitBtn');
  // Voice list prompt if empty/default
  const vl=document.getElementById('voice-list');
  if(vl&&vl.children.length===0)vl.textContent=t('scanPrompt');
  // Settings overlay

// ── Overlays ───────────────────────────────────────────────────
function showOv(id){document.getElementById(id).style.display='flex'}
function hideOv(id){document.getElementById(id).style.display='none'}

// ── Toast ──────────────────────────────────────────────────────
let toastTimer=null;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2500)}

// ── Boot ───────────────────────────────────────────────────────
updateDisplay();updateUILabels();renderScreen();

// Fixer la position du cercle une fois pour toutes
setTimeout(()=>{
  const cz=document.getElementById('circle-container');
  const zone=document.querySelector('.center-zone');
  if(cz&&zone){
    const zr=zone.getBoundingClientRect();
    const cr=cz.getBoundingClientRect();
    const top=cr.top-zr.top;
    const left=cr.left-zr.left;
    cz.style.position='absolute';
    cz.style.top=top+'px';
    cz.style.left=left+'px';
    cz.style.transform='none';
  }
},100);

// ── Splash ─────────────────────────────────────────────────────
function hideSplash(){
  const s=document.getElementById('splash');
  if(!s)return;
  s.style.transition='opacity 0.6s';
  s.style.opacity='0';
  setTimeout(()=>{s.style.display='none'},650);
}

(function(){
  const tagline=document.getElementById('splash-tagline');
  const skip=document.getElementById('splash-skip');
  const arcTop=document.getElementById('splash-arc-top');
  const arcBot=document.getElementById('splash-arc-bot');

  // Tagline fade in
  setTimeout(()=>{
    if(tagline){tagline.style.transition='opacity 0.6s';tagline.style.opacity='1';}
  },600);

  // Skip button appears
  setTimeout(()=>{
    if(skip){skip.style.transition='opacity 0.5s';skip.style.opacity='1';}
  },1500);

  // Accelerate
  setTimeout(()=>{
    if(arcTop)arcTop.classList.add('fast');
    if(arcBot)arcBot.classList.add('fast');
  },2200);

  // Explosion — mot vers le bandeau, cercle vers le centre de l'app
  setTimeout(()=>{
    const wordmark=document.getElementById('splash-wordmark');
    const svg=document.querySelector('#splash-logo svg');
    const logo=document.getElementById('splash-logo');
    if(tagline){tagline.style.transition='opacity 0.3s';tagline.style.opacity='0';}
    if(skip){skip.style.transition='opacity 0.3s';skip.style.opacity='0';}

    const W=window.innerWidth;
    const H=window.innerHeight;

    // Position actuelle du logo centré
    const logoRect=logo?logo.getBoundingClientRect():null;

    // Cible du mot : bandeau logo en haut (~20px du haut, centré)
    const logoBand=document.querySelector('.logo-band');
    const bandRect=logoBand?logoBand.getBoundingClientRect():{top:0,height:44};
    const wordTargetY=bandRect.top+bandRect.height/2;
    const wordTargetX=W/2;

    // Cible du cercle : centre de l'app
    const circleContainer=document.getElementById('circle-container');
    const circRect=circleContainer?circleContainer.getBoundingClientRect():null;
    const circTargetX=circRect?circRect.left+circRect.width/2:W/2;
    const circTargetY=circRect?circRect.top+circRect.height/2:H/2;

    // Animer le mot
    if(wordmark&&logoRect){
      const wx=logoRect.left+logoRect.width/2;
      const wy=logoRect.top+logoRect.height/2;
      wordmark.style.position='fixed';
      wordmark.style.left=wx+'px';
      wordmark.style.top=wy+'px';
      wordmark.style.transform='translate(-50%,-50%)';
      wordmark.style.zIndex='9999';
      wordmark.style.transition='left 0.8s cubic-bezier(0.4,0,0.2,1),top 0.8s cubic-bezier(0.4,0,0.2,1),font-size 0.8s';
      requestAnimationFrame(()=>{requestAnimationFrame(()=>{
        wordmark.style.left=wordTargetX+'px';
        wordmark.style.top=wordTargetY+'px';
        wordmark.style.fontSize='20px';
      })});
    }

    // Animer le cercle SVG
    if(svg&&logoRect){
      const sx=logoRect.left;
      const sy=logoRect.top;
      svg.style.position='fixed';
      svg.style.left=sx+'px';
      svg.style.top=sy+'px';
      svg.style.zIndex='9999';
      svg.style.transition='left 0.8s cubic-bezier(0.4,0,0.2,1),top 0.8s cubic-bezier(0.4,0,0.2,1),width 0.8s,height 0.8s';
      requestAnimationFrame(()=>{requestAnimationFrame(()=>{
        const targetSize=190;
        svg.style.left=(circTargetX-targetSize/2)+'px';
        svg.style.top=(circTargetY-targetSize/2)+'px';
        svg.style.width=targetSize+'px';
        svg.style.height=targetSize+'px';
      })});
    }
  },2800);

  // Hide splash — garanti même si erreur JS
  setTimeout(hideSplash, 3500);
  // Sécurité absolue
  window.onerror=function(){hideSplash();return false};
})();

</script>
